name: Build & Deploy (FTP)

# اجرا هنگام push روی شاخه اصلی + امکان اجرای دستی از تب Actions
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# جلوگیری از اجرای هم‌زمان چند deploy روی یک شاخه
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build static site and upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build static export (HTML / CSS / JS -> out/)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to host over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # مسیر مقصد روی هاست (مثلاً public_html/). پیش‌فرض ریشه است.
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # خروجی build نکست‌جی‌اس؛ اسلش انتهایی مهم است تا محتوای پوشه آپلود شود.
          local-dir: ./out/
          # پروتکل: ftp (ساده) یا ftps (امن). در صورت پشتیبانی هاست ftps توصیه می‌شود.
          protocol: ${{ vars.FTP_PROTOCOL || 'ftp' }}
          # فایل‌هایی که نباید آپلود/حذف شوند
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
